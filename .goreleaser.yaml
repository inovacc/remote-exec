version: 2
project_name: remote-exec
builds:
  - id: rexec-agentd
    main: ./cmd/rexec-agentd
    binary: rexec-agentd
    env: [CGO_ENABLED=0]
    ldflags: ["-s -w -X main.version={{ .Version }}"]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
  - id: rexec
    main: ./cmd/rexec
    binary: rexec
    env: [CGO_ENABLED=0]
    ldflags: ["-s -w -X main.version={{ .Version }}"]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
checksum:
  name_template: "checksums.txt"
