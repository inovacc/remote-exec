syntax = "proto3";

package rexec.v1;

option go_package = "github.com/inovacc/remote-exec/internal/proto/rexec/v1;rexecv1";

// Agent is the remote-exec agent API. Enroll runs on the bootstrap channel
// (token-authenticated, no client cert yet); every other method runs over mTLS
// and is gated by the caller's certificate role (Subject O=).
service Agent {
  // Enroll validates a single-use join token and signs the controller's client
  // CSR. Public (bootstrap) method — authenticated by the token, not a cert.
  rpc Enroll(EnrollRequest) returns (EnrollResponse);

  // Identity returns the agent's stable id and server-cert fingerprint.
  // Minimum role: rex:reader.
  rpc Identity(IdentityRequest) returns (IdentityResponse);

  // Info returns host/os/arch/version. Minimum role: rex:reader.
  rpc Info(InfoRequest) returns (InfoResponse);

  // Exec runs a non-destructive command (build/test/analyze) and streams its
  // output live. Minimum role: rex:operator.
  rpc Exec(ExecRequest) returns (stream ExecChunk);

  // Deploy runs a destructive command (deploy/release/delete) and streams its
  // output live. Minimum role: rex:admin. The P4 destructive-op gate adds the
  // agent-side policy check and the NeedsApproval live-approval flow.
  rpc Deploy(ExecRequest) returns (stream ExecChunk);
}

message EnrollRequest {
  string token = 1;
  bytes csr_pem = 2;
}

message EnrollResponse {
  bytes client_cert_pem = 1;
  bytes ca_pem = 2;
  string agent_id = 3;
  string fingerprint = 4;
}

message IdentityRequest {}

message IdentityResponse {
  string agent_id = 1;
  string fingerprint = 2;
}

message InfoRequest {}

message InfoResponse {
  string os = 1;
  string arch = 2;
  string hostname = 3;
  string version = 4;
}

message ExecRequest {
  string command = 1;
  repeated string args = 2;
  string working_dir = 3;
  map<string, string> env = 4;
}

// ExecChunk is one streamed unit of a running command: a slice of stdout or
// stderr, the final exit code, or (P4) a request for the caller to approve a
// destructive operation before it proceeds.
message ExecChunk {
  oneof msg {
    bytes stdout = 1;
    bytes stderr = 2;
    int32 exit_code = 3;
    ApprovalRequest needs_approval = 4;
  }
}

message ApprovalRequest {
  string operation = 1;   // human-readable description of what will run
  string reason = 2;      // why approval is required (policy said "ask")
  string approval_id = 3; // one-time id the controller must echo back to proceed
}
